<!DOCTYPE html>
<html>
<head>
    <title>Cart</title>

    <style>
    body {
        font-family: Arial;
        background: linear-gradient(to right, #f6d365, #fda085);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .box {
        background: white;
        padding: 30px;
        border-radius: 15px;
        text-align: center;
        width: 350px;
        box-shadow: 0 0 20px rgba(0,0,0,0.2);
    }

    h2 {
        color: #333;
    }

    p {
        margin: 10px 0;
    }

    button {
        background: orange;
        color: white;
        padding: 10px 15px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
    }
    </style>

</head>

<body>

<div class="box">

<h2>🛒 Your Cart</h2>

<p>No items added yet.</p>

<p style="color:gray; font-size:14px;">
Items you select will appear here.
</p>

<br>

<a href="/menu/">
    <button>Go to Menu</button>
</a>

</div>

</body>
</html>
